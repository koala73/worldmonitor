<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Monitor - Offline</title>
  <style>
    body { background: #0a0f0a; color: #e0e0e0; font-family: system-ui;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .c { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #1a3a1a;
             color: #4ade80; border: 1px solid #2a5a2a; border-radius: 4px;
             cursor: pointer; }
  </style>
</head>
<body>
  <div class="c">
    <h1 id="t-title">You're Offline</h1>
    <p id="t-msg">World Monitor requires an internet connection for real-time intelligence data.</p>
    <button id="t-retry" onclick="location.reload()">Retry</button>
  </div>
  <script>
    // Self-contained translations — the SW serves this page with no JS bundle,
    // so we can't reuse i18next. Locale picked from i18next-browser-languagedetector's
    // localStorage cache (same key the main app writes).
    (function(){
      var T = {
        en: { title: "You're Offline", msg: "World Monitor requires an internet connection for real-time intelligence data.", retry: "Retry" }
      };
      try {
        var l = (localStorage.getItem('i18nextLng') || navigator.language || 'en').split('-')[0].toLowerCase();
        var d = T[l] || T.en;
        document.documentElement.lang = l;
        document.title = 'World Monitor — ' + d.title;
        document.getElementById('t-title').textContent = d.title;
        document.getElementById('t-msg').textContent = d.msg;
        document.getElementById('t-retry').textContent = d.retry;
      } catch (e) { /* keep English defaults */ }
    })();
  </script>
</body>
</html>
