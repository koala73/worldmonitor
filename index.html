<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Primary Meta Tags -->
    <title>SalesIntel - AI-Powered Sales Intelligence</title>
    <meta name="title" content="SalesIntel - AI-Powered Sales Intelligence" />
    <meta name="description" content="AI-powered sales intelligence platform. Track buying signals, identify opportunities, and close deals faster with real-time commercial intent data." />
    <meta name="keywords" content="sales intelligence, buying signals, intent data, lead scoring, account health, sales prospecting, AI sales, commercial intent, opportunity detection" />
    <meta name="theme-color" content="#0A0F1C" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SalesIntel - AI-Powered Sales Intelligence" />
    <meta property="og:description" content="Track buying signals, identify opportunities, and close deals faster with real-time commercial intent data." />
    <meta property="og:site_name" content="SalesIntel" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SalesIntel - AI-Powered Sales Intelligence" />
    <meta name="twitter:description" content="Track buying signals, identify opportunities, and close deals faster with real-time commercial intent data." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SalesIntel",
      "url": "https://salesintel.app/",
      "description": "AI-powered sales intelligence platform for tracking buying signals and closing deals faster.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "featureList": [
        "AI-powered intent classification",
        "Real-time buying signal detection",
        "Account health scoring",
        "Opportunity convergence alerts",
        "Company intelligence profiles",
        "C-Level executive tracking",
        "AI icebreaker generation",
        "Signal memory and semantic search"
      ]
    }
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favico/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favico/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favico/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favico/apple-touch-icon.png" />

    <!-- Fonts: Inter for clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Critical CSS: SalesIntel skeleton -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0A0F1C;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .skeleton-shell {
        display: flex;
        height: 100vh;
        background: #0A0F1C;
        overflow: hidden;
      }

      .skeleton-sidebar {
        width: 240px;
        background: #0f172a;
        border-right: 1px solid #1E293B;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
      }

      .skeleton-logo {
        height: 32px;
        width: 140px;
        border-radius: 6px;
        background: linear-gradient(90deg, rgba(59,130,246,.15), rgba(59,130,246,.05));
        margin-bottom: 24px;
      }

      .skeleton-nav-item {
        height: 40px;
        border-radius: 8px;
        background: rgba(255,255,255,.03);
      }

      .skeleton-nav-item.active {
        background: rgba(59,130,246,.1);
        border: 1px solid rgba(59,130,246,.2);
      }

      .skeleton-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .skeleton-topbar {
        height: 56px;
        background: #0f172a;
        border-bottom: 1px solid #1E293B;
        display: flex;
        align-items: center;
        padding: 0 24px;
        gap: 16px;
        flex-shrink: 0;
      }

      .skeleton-search {
        flex: 1;
        max-width: 480px;
        height: 36px;
        border-radius: 8px;
        background: rgba(255,255,255,.05);
        border: 1px solid #1E293B;
      }

      .skeleton-content {
        flex: 1;
        padding: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .skeleton-hero-search {
        width: 100%;
        max-width: 640px;
        height: 80px;
        border-radius: 16px;
        background: rgba(15,23,42,.8);
        border: 1px solid #1E293B;
        margin-top: 48px;
      }

      .skeleton-pills {
        display: flex;
        gap: 12px;
      }

      .skeleton-pill {
        height: 28px;
        width: 180px;
        border-radius: 14px;
        background: rgba(255,255,255,.03);
      }

      .skeleton-cards {
        width: 100%;
        max-width: 800px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
      }

      .skeleton-card {
        height: 80px;
        border-radius: 12px;
        background: #0f172a;
        border: 1px solid #1E293B;
        animation: skel-shimmer 1.5s infinite;
        background-size: 200% 100%;
        background-image: linear-gradient(90deg, #0f172a 25%, #1a2332 50%, #0f172a 75%);
      }

      @keyframes skel-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (max-width: 768px) {
        .skeleton-sidebar { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="skeleton-shell" aria-hidden="true">
        <div class="skeleton-sidebar">
          <div class="skeleton-logo"></div>
          <div class="skeleton-nav-item active"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
          <div class="skeleton-nav-item"></div>
        </div>
        <div class="skeleton-main">
          <div class="skeleton-topbar">
            <div class="skeleton-search"></div>
          </div>
          <div class="skeleton-content">
            <div class="skeleton-hero-search"></div>
            <div class="skeleton-pills">
              <div class="skeleton-pill"></div>
              <div class="skeleton-pill"></div>
              <div class="skeleton-pill"></div>
            </div>
            <div class="skeleton-cards">
              <div class="skeleton-card"></div>
              <div class="skeleton-card"></div>
              <div class="skeleton-card"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
