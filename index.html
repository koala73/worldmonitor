<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Reader</title>
    <meta name="description" content="AI-powered news reader with clustering, deduplication, and AI narration" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>" />
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#f8fafc}
      [data-theme="light"] body{background:#ffffff;color:#1e293b}
      #app{min-height:100vh}
      .loading-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
      .loading-shell .spinner{width:32px;height:32px;border:3px solid rgba(13,148,136,.3);border-top-color:#0d9488;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .loading-shell p{color:#94a3b8;font-size:14px}
    </style>
    <script>
      // Apply theme before paint
      (function(){try{var t=localStorage.getItem('newsreader-theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})()
    </script>
  </head>
  <body>
    <div id="app">
      <div class="loading-shell">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
