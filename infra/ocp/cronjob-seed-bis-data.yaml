apiVersion: batch/v1
kind: CronJob
metadata:
  name: seed-bis-data
  namespace: hlidskjalf-monitor
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: seed
              image: image-registry.openshift-image-registry.svc:5000/hlidskjalf-monitor/hlidskjalf-mon:latest
              command: ["node", "scripts/seed-bis-data.mjs"]
              env:
                - name: REDIS_URL
                  value: redis://redis-svc.hlidskjalf-monitor.svc:6379
              envFrom:
                - secretRef:
                    name: hlidskjalf-secrets
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
                  cpu: 200m
