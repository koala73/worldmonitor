apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hlidskjalf-monitor
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:latest
          args: ["redis-server", "--appendonly", "yes", "--protected-mode", "no", "--dir", "/var/lib/redis/data"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /var/lib/redis/data
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 256Mi, cpu: 200m }
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
