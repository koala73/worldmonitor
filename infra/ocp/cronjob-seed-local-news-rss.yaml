apiVersion: batch/v1
kind: CronJob
metadata:
  name: seed-local-news-rss
  namespace: hlidskjalf-monitor
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: seed
              image: image-registry.openshift-image-registry.svc:5000/hlidskjalf-monitor/hlidskjalf-mon:latest
              command: ["node", "scripts/seed-local-news-rss.mjs"]
              env:
                - name: REDIS_URL
                  value: redis://redis-svc.hlidskjalf-monitor.svc:6379
                - name: CIRCLE0_CONFIG_PATH
                  value: /app/config/circle0.json
              envFrom:
                - secretRef:
                    name: hlidskjalf-secrets
              volumeMounts:
                - name: circle0-config
                  mountPath: /app/config
                  readOnly: true
              resources:
                requests:
                  memory: 128Mi
                  cpu: 50m
                limits:
                  memory: 256Mi
                  cpu: 200m
          volumes:
            - name: circle0-config
              configMap:
                name: circle0-config
                optional: true
