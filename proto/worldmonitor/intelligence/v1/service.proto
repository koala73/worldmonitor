syntax = "proto3";
package worldmonitor.intelligence.v1;

import "sebuf/http/annotations.proto";
import "worldmonitor/intelligence/v1/list_satellites.proto";

// IntelligenceService provides APIs for technical and strategic intelligence.
service IntelligenceService {
  option (sebuf.http.service_config) = {base_path: "/api/intelligence/v1"};

  // ListSatellites retrieves current orbital positions and metadata.
  rpc ListSatellites(ListSatellitesRequest) returns (ListSatellitesResponse) {
    option (sebuf.http.config) = {path: "/list-satellites"};
  }
}
