syntax = "proto3";

package worldmonitor.supply_chain.v1;

message ShippingRatePoint {
  string date = 1;
  double value = 2;
}

message ShippingIndex {
  string index_id = 1;
  string name = 2;
  double current_value = 3;
  double previous_value = 4;
  double change_pct = 5;
  string unit = 6;
  repeated ShippingRatePoint history = 7;
  bool spike_alert = 8;
}

message ChokepointInfo {
  string id = 1;
  string name = 2;
  double lat = 3;
  double lon = 4;
  int32 disruption_score = 5;
  string status = 6;
  int32 active_warnings = 7;
  string congestion_level = 8;
  repeated string affected_routes = 9;
  string description = 10;
  int32 ais_disruptions = 11;
  // Directional flow labels tracked at this chokepoint (e.g. "eastbound", "westbound").
  // Aligns with S&P Global Market Intelligence tanker DWT departure data.
  repeated string directions = 12;
  // DWT (deadweight tonnage) departure metrics per direction.
  // Sourced from S&P Global Market Intelligence vessel tracking data.
  repeated DirectionalDwt directional_dwt = 13;
}

message DirectionalDwt {
  string direction = 1;
  // Current week DWT departing (thousands of metric tonnes).
  double dwt_thousand_tonnes = 2;
  // Week-over-week change in DWT departing (percentage).
  double wow_change_pct = 3;
}

message MineralProducer {
  string country = 1;
  string country_code = 2;
  double production_tonnes = 3;
  double share_pct = 4;
}

message CriticalMineral {
  string mineral = 1;
  repeated MineralProducer top_producers = 2;
  double hhi = 3;
  string risk_rating = 4;
  double global_production = 5;
  string unit = 6;
}
