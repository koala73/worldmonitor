name: Seed Hourly Data (Every hour)

# ──────────────────────────────────────────────────────────────────────────
# Natural-events seeding (EONET + GDACS + NHC → Redis `natural:events:v1`).
#
# RE-ENABLED 2026-06-03 — must run on GitHub, NOT Vercel. GDACS returns HTTP 403
# to Vercel's serverless IPs (both edge and node runtimes), so the Vercel cron
# silently dropped every GDACS-sourced event — droughts (GDACS-exclusive) went
# to zero and storms/floods collapsed to EONET-only counts. GitHub Actions
# runners aren't blocked by GDACS, so this is where natural events belong.
# (The Vercel /api/natural/v1/refresh endpoint + its cron were removed.)
# ──────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # :23 not :00 — top-of-hour is GitHub's most congested cron slot and
    # scheduled runs get dropped there under load.
    - cron: '23 * * * *'
  workflow_dispatch: {}

concurrency:
  group: seed-hourly
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Map layers: Wildfires (NASA EONET, major fires) + Natural Events
      # (EONET storms/floods/volcanoes + GDACS + NHC). One month rolling window.
      - name: Seed natural events
        run: node scripts/seed-natural-events.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
