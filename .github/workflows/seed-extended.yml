name: Seed Extended Data (Every 2 hours)

on:
  schedule:
    - cron: '15 */2 * * *'
  workflow_dispatch: {}

concurrency:
  group: seed-extended
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Geopolitical & conflict ---
      # NOTE on iran-events: the input file (scripts/data/iran-events-latest.json)
      # is a stale scrape of a competitor (iran.liveuamap.com), fake-freshened
      # via parseRelativeTime() on every cron run. New iOS builds no longer
      # consume this data — the Conflict feed/map there comes from the
      # live-news LLM `isConflict` flag and the GDELT `conflict` topic.
      # We keep this seeder running so OLDER App Store / TestFlight builds
      # (which still read bootstrap.iranEvents) don't suddenly go empty.
      # Plan: sunset this step once telemetry shows old-build adoption has
      # dropped below the threshold we're comfortable with.
      - name: Seed Iran events
        run: node scripts/seed-iran-events.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed UCDP events
        run: node scripts/seed-ucdp-events.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          UCDP_ACCESS_TOKEN: ${{ secrets.UCDP_ACCESS_TOKEN }}

      - name: Seed unrest events
        run: node scripts/seed-unrest-events.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ACLED_ACCESS_TOKEN: ${{ secrets.ACLED_ACCESS_TOKEN }}

      # --- Environment & climate ---
      - name: Seed natural events
        run: node scripts/seed-natural-events.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed climate anomalies
        run: node scripts/seed-climate-anomalies.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      # --- Infrastructure & cyber ---
      - name: Seed internet outages
        continue-on-error: true
        run: node scripts/seed-internet-outages.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Seed cyber threats
        run: node scripts/seed-cyber-threats.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          URLHAUS_AUTH_KEY: ${{ secrets.URLHAUS_AUTH_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}

      # --- Aviation & wildfires ---
      - name: Seed airport delays
        run: node scripts/seed-airport-delays.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ICAO_API_KEY: ${{ secrets.ICAO_API_KEY }}

      - name: Seed fire detections
        continue-on-error: true
        run: node scripts/seed-fire-detections.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}

      # --- Predictions & insights ---
      - name: Seed prediction markets
        run: node scripts/seed-prediction-markets.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed insights
        run: node scripts/seed-insights.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # --- Economic data ---
      - name: Seed BIS data
        run: node scripts/seed-bis-data.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
