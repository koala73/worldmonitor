name: Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'

jobs:
  markdown:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Resolve changed markdown files
        id: files
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t markdown_files < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '*.md')
          if [ "${#markdown_files[@]}" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\0' "${markdown_files[@]}" > "$RUNNER_TEMP/markdown-files.txt"
          echo "count=${#markdown_files[@]}" >> "$GITHUB_OUTPUT"
      - name: Run markdownlint on changed files
        if: steps.files.outputs.count != '0'
        shell: bash
        run: xargs -0 npx markdownlint-cli2 < "$RUNNER_TEMP/markdown-files.txt"
