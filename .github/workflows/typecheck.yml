name: Typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    # No secrets needed — run for all PRs including forks

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:api
