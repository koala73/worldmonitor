# US edge health probe — MANUAL runs only.
#
# The scheduled probe moved to Vercel crons (vercel.json →
# /api/ops/edge-probe every 15 min + /api/ops/edge-probe-summary daily at
# 17:07 UTC) because GitHub's cron is best-effort and was dropping most
# runs (*/15 fired ~2x in 8h). This workflow remains as an on-demand,
# Vercel-independent check — useful exactly when you suspect Vercel
# itself is misbehaving, since the cron probe runs inside Vercel.
#
# Required repo secrets:
#   WM_PROBE_KEY             — the iOS-bundled API key (APIConfig.swift)
#   WM_SLACK_ALERT_WEBHOOK   — Slack incoming-webhook URL
# Optional:
#   GLOBALPING_TOKEN         — raises Globalping rate limits (free account)
#   UPSTASH_REDIS_REST_URL / UPSTASH_REDIS_REST_TOKEN — intro-once marker

name: edge-probe

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        type: choice
        options: [alert, summary]
        default: summary

concurrency:
  group: edge-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/probe-us-edge.mjs
            api/ops/_probe-core.js
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe US edge
        run: node scripts/probe-us-edge.mjs 2.2 ${{ inputs.mode == 'summary' && '--summary' || '' }}
        env:
          WM_PROBE_KEY: ${{ secrets.WM_PROBE_KEY }}
          WM_SLACK_ALERT_WEBHOOK: ${{ secrets.WM_SLACK_ALERT_WEBHOOK }}
          GLOBALPING_TOKEN: ${{ secrets.GLOBALPING_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
