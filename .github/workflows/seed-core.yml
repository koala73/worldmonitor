name: Seed Core Data (Every 30 min)

on:
  schedule:
    # Off-peak minutes: GitHub drops scheduled runs queued at popular marks
    # (:00/:15/:30/:45) under load — the cause of seeded keys (chokepoints,
    # shippingRates) intermittently TTL-lapsing out of Redis.
    - cron: '11,41 * * * *'
  workflow_dispatch: {}

concurrency:
  group: seed-core
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Fast seeds (market-critical, high-frequency data) ---
      # DISABLED 2026-06-03 — earthquake seeding migrated to a Vercel cron.
      #   endpoint: GET /api/seismology/v1/refresh (api/seismology/v1/refresh.ts)
      #   schedule: vercel.json crons → "9,39 * * * *"
      # The GitHub runs were failing, leaving the map's earthquake layer empty.
      # The Vercel cron calls fetchFreshEarthquakes() (now the USGS 2.5_month
      # feed, ~1.8k quakes) and writes seismology:earthquakes:v1 + seed-meta.
      # Re-enable by uncommenting if the Vercel cron is ever retired.
      # - name: Seed earthquakes
      #   run: node scripts/seed-earthquakes.mjs
      #   env:
      #     UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      #     UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed market quotes
        run: node scripts/seed-market-quotes.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Seed commodity quotes
        run: node scripts/seed-commodity-quotes.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed crypto quotes
        run: node scripts/seed-crypto-quotes.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Seed service statuses
        run: node scripts/seed-service-statuses.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed ETF flows
        run: node scripts/seed-etf-flows.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed gulf quotes
        run: node scripts/seed-gulf-quotes.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Seed stablecoin markets
        run: node scripts/seed-stablecoin-markets.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}

      - name: Seed sector summary
        run: node scripts/seed-sectors.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      # --- Military & theater posture (seeds both flights + theater posture) ---
      - name: Seed military flights
        continue-on-error: true
        run: node scripts/seed-military-flights.mjs
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          OPENSKY_USERNAME: ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD: ${{ secrets.OPENSKY_PASSWORD }}
