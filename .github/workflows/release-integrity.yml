name: Release Integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  integrity-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Check version consistency
        run: node scripts/sync-desktop-version.mjs --check

      - name: Check package lock integrity
        run: node scripts/check-package-lock.mjs

  release-doctor:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [full, tech, finance]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Run release doctor (${{ matrix.variant }}) on pull requests
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VARIANT: ${{ matrix.variant }}
        run: node scripts/release-doctor.mjs --allow-existing-target-release --variant "$VARIANT"

      - name: Run release doctor (${{ matrix.variant }}) on main push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VARIANT: ${{ matrix.variant }}
        run: node scripts/release-doctor.mjs --variant "$VARIANT"
