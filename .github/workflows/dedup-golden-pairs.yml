name: Dedup golden-pair canary

# Nightly drift detector for the embedding-based story dedup. Calls
# the LIVE OpenRouter embedder against a small canonical canary fixture
# and asserts each pair still classifies as expected under the current
# production threshold. NOT run from the brief cron — this is a
# deliberate separate workflow so the hot-path stays deterministic
# and off the embedding network budget.
#
# On failure the job opens a GitHub issue via the `gh` CLI so the
# signal isn't silently lost in the Actions UI.

on:
  schedule:
    # 07:17 UTC — off-peak for most team timezones and spaced from
    # other nightly cadences to avoid queue pile-up.
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      threshold:
        description: >-
          Optional cosine threshold override (for calibration sweeps).
          Leave EMPTY on routine reruns so the job validates the
          same DIGEST_DEDUP_COSINE_THRESHOLD production uses.
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run golden-pair validator
        id: validate
        # Canary MUST validate the SAME classifier production runs. We
        # source DIGEST_DEDUP_COSINE_THRESHOLD and _ENTITY_VETO_ENABLED
        # from GitHub repo variables — keep those values in lockstep
        # with Railway env. If Railway flips a knob, flip the repo
        # variable at the same time, otherwise the canary can go green
        # while prod is wrong (or red while prod is healthy).
        #
        # workflow_dispatch still supports a threshold override (e.g.
        # for calibration sweeps), but the scheduled run always uses
        # the production-parity config.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DIGEST_DEDUP_COSINE_THRESHOLD: ${{ vars.DIGEST_DEDUP_COSINE_THRESHOLD || '0.60' }}
          DIGEST_DEDUP_ENTITY_VETO_ENABLED: ${{ vars.DIGEST_DEDUP_ENTITY_VETO_ENABLED || '1' }}
          DISPATCH_THRESHOLD: ${{ github.event.inputs.threshold }}
        run: |
          set -o pipefail
          # A --threshold flag arrives ONLY on manual dispatch with an
          # explicit value, so the scheduled run never overrides the
          # env. "${input:-}" resolves to empty on scheduled runs.
          CLI_FLAGS=(--fixture tests/fixtures/brief-dedup-golden-pairs.json)
          if [ -n "${DISPATCH_THRESHOLD:-}" ]; then
            CLI_FLAGS+=(--threshold "$DISPATCH_THRESHOLD")
          fi
          node scripts/tools/golden-pair-validator.mjs "${CLI_FLAGS[@]}" \
            | tee /tmp/golden-pair-output.txt
        shell: bash
        continue-on-error: false

      - name: Open issue on validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Compose the issue body via printf rather than a heredoc.
          # Validator stdout (fixture text) flows through $LOG_TAIL and
          # MUST NOT be interpreted as shell, so we never embed it in
          # a heredoc that allows command substitution. We also sanitise
          # $LOG_TAIL to printable ASCII + tab/LF/CR to strip ANSI /
          # control sequences that could smuggle rendering surprises
          # into the issue body.
          TITLE="Dedup golden-pair canary failed ($(date -u +%Y-%m-%d))"
          LOG_TAIL=$(tail -n 80 /tmp/golden-pair-output.txt 2>/dev/null \
            | LC_ALL=C tr -cd '\11\12\15\40-\176' \
            || printf '(no logs captured)')
          {
            printf '%s\n' 'The nightly embedding-dedup golden-pair validator detected a'
            printf '%s\n' 'classification drift against the canonical canary fixture.'
            printf '%s\n\n' 'Possible causes:'
            printf '%s\n' '- OpenRouter upgraded the `text-embedding-3-small` weights'
            printf '%s\n' '  without a version bump (check cache key + recalibrate).'
            printf '%s\n' '- `DIGEST_DEDUP_COSINE_THRESHOLD` needs to move.'
            printf '%s\n\n' '- The canary fixture is out of date vs real wire examples.'
            printf '%s\n' 'Logs:'
            printf '%s\n' '```'
            printf '%s\n' "$LOG_TAIL"
            printf '%s\n\n' '```'
            printf 'Workflow run: %s\n' "$RUN_URL"
          } > /tmp/issue-body.md
          # `--create-label` (gh >=2.44) creates any missing label on
          # the fly. Without it, a missing `dedup`/`canary`/`p1` label
          # makes `gh issue create` fail — and the old `|| true`
          # tail swallowed that silently, breaking the drift alert
          # channel. Create labels so the alert always lands.
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/issue-body.md \
            --label "dedup" \
            --label "canary" \
            --label "p1" \
            --create-label
