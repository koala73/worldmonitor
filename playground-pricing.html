<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldMonitor Pricing Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060606;
    --card: #18181b;
    --border: #2a2a2a;
    --green: #22c55e;
    --green-hover: #16a34a;
    --text: #e8e8e8;
    --muted: #888;
    --mono: 'SF Mono', Monaco, 'Cascadia Code', 'Fira Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  /* Controls sidebar */
  .controls {
    position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
    background: #111; border-right: 1px solid var(--border);
    padding: 20px; overflow-y: auto; z-index: 10;
  }
  .controls h2 { font-size: 14px; color: var(--green); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .control-group { margin-bottom: 16px; }
  .control-group label { display: block; font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .control-group input[type="number"],
  .control-group input[type="text"],
  .control-group select {
    width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 6px 8px; font-size: 13px; font-family: var(--mono); border-radius: 3px;
  }
  .control-group input[type="color"] { width: 40px; height: 28px; border: 1px solid var(--border); background: none; cursor: pointer; }
  .preset-btn {
    display: inline-block; padding: 4px 10px; font-size: 11px; font-family: var(--mono);
    background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    border-radius: 3px; margin: 2px;
  }
  .preset-btn:hover { border-color: var(--green); color: var(--text); }
  .preset-btn.active { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Main content */
  .main { margin-left: 280px; padding: 40px 24px; }

  /* Pricing section */
  .pricing-section { max-width: 1200px; margin: 0 auto; }
  .pricing-header { text-align: center; margin-bottom: 48px; }
  .pricing-header h2 { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
  .pricing-header p { color: var(--muted); font-size: 15px; max-width: 500px; margin: 0 auto 24px; }

  /* Billing toggle */
  .billing-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 4px;
  }
  .billing-btn {
    padding: 8px 16px; border-radius: 3px; font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; border: none;
    background: transparent; color: var(--muted); transition: all 0.2s;
  }
  .billing-btn.active { background: var(--green); color: var(--bg); font-weight: 700; }
  .billing-btn:hover:not(.active) { color: var(--text); }
  .save-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;
    font-weight: 700;
  }
  .billing-btn.active .save-badge { background: rgba(0,0,0,0.2); color: var(--bg); }
  .billing-btn:not(.active) .save-badge { background: rgba(34,197,94,0.1); color: var(--green); }

  /* Cards grid */
  .cards-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
  }
  @media (max-width: 1024px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } }

  .tier-card {
    position: relative; background: var(--card); border-radius: 8px; padding: 24px;
    display: flex; flex-direction: column; border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .tier-card.highlighted {
    border: 2px solid var(--green);
    box-shadow: 0 0 24px rgba(34,197,94,0.1);
  }
  .badge {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: var(--bg); padding: 4px 12px; border-radius: 20px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .badge svg { width: 12px; height: 12px; }

  .tier-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .tier-name.green { color: var(--green); }
  .tier-desc { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  .tier-price { margin-bottom: 24px; }
  .tier-price .amount { font-size: 40px; font-weight: 700; }
  .tier-price .suffix { font-size: 13px; color: var(--muted); margin-left: 2px; }

  .features-list { list-style: none; flex: 1; margin-bottom: 24px; }
  .features-list li {
    display: flex; align-items: flex-start; gap: 8px; font-size: 13px;
    color: var(--muted); margin-bottom: 10px;
  }
  .features-list li svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
  .features-list li svg.green { color: var(--green); }
  .features-list li svg.gray { color: var(--muted); }

  .cta-btn {
    display: block; text-align: center; padding: 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 700; text-decoration: none; transition: all 0.2s;
  }
  .cta-btn.primary { background: var(--green); color: var(--bg); }
  .cta-btn.primary:hover { background: var(--green-hover); }
  .cta-btn.secondary { border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .cta-btn.secondary:hover { border-color: var(--text); color: var(--text); }

  .promo-note { text-align: center; font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 32px; }
</style>
</head>
<body>

<div class="controls">
  <h2>Pricing Config</h2>

  <div class="control-group">
    <label>Presets</label>
    <button class="preset-btn active" onclick="applyPreset('current')">Current</button>
    <button class="preset-btn" onclick="applyPreset('higher')">Higher Prices</button>
    <button class="preset-btn" onclick="applyPreset('startup')">Startup Friendly</button>
  </div>
  <hr>

  <div class="control-group">
    <label>Pro Monthly ($)</label>
    <input type="number" id="proMonthly" value="19" onchange="updateAll()">
  </div>
  <div class="control-group">
    <label>Pro Annual ($)</label>
    <input type="number" id="proAnnual" value="190" onchange="updateAll()">
  </div>
  <hr>
  <div class="control-group">
    <label>API Monthly ($)</label>
    <input type="number" id="apiMonthly" value="49" onchange="updateAll()">
  </div>
  <div class="control-group">
    <label>API Annual ($)</label>
    <input type="number" id="apiAnnual" value="490" onchange="updateAll()">
  </div>
  <hr>
  <div class="control-group">
    <label>Annual Discount Label</label>
    <input type="text" id="discountLabel" value="Save 17%" onchange="updateAll()">
  </div>
  <div class="control-group">
    <label>Accent Color</label>
    <input type="color" id="accentColor" value="#22c55e" onchange="updateAll()">
  </div>
  <hr>
  <div class="control-group">
    <label>API Requests/Day</label>
    <input type="text" id="apiRequests" value="1,000" onchange="updateAll()">
  </div>
</div>

<div class="main">
  <div class="pricing-section">
    <div class="pricing-header">
      <h2>Choose Your Plan</h2>
      <p>From real-time monitoring to full intelligence infrastructure. Pick the tier that fits your mission.</p>
      <div class="billing-toggle">
        <button class="billing-btn active" id="btnMonthly" onclick="setBilling('monthly')">Monthly</button>
        <button class="billing-btn" id="btnAnnual" onclick="setBilling('annual')">
          Annual <span class="save-badge" id="saveBadge">Save 17%</span>
        </button>
      </div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
    <p class="promo-note">Have a promo code? Enter it during checkout.</p>
  </div>
</div>

<script>
const checkSvg = (cls) => `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
const zapSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
const arrowSvg = `<svg style="width:14px;height:14px;display:inline;vertical-align:middle;margin-left:4px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;

let billing = 'monthly';

const state = {
  proMonthly: 19, proAnnual: 190,
  apiMonthly: 49, apiAnnual: 490,
  discountLabel: 'Save 17%',
  accentColor: '#22c55e',
  apiRequests: '1,000',
};

function readControls() {
  state.proMonthly = Number(document.getElementById('proMonthly').value);
  state.proAnnual = Number(document.getElementById('proAnnual').value);
  state.apiMonthly = Number(document.getElementById('apiMonthly').value);
  state.apiAnnual = Number(document.getElementById('apiAnnual').value);
  state.discountLabel = document.getElementById('discountLabel').value;
  state.accentColor = document.getElementById('accentColor').value;
  state.apiRequests = document.getElementById('apiRequests').value;
}

function writeControls() {
  document.getElementById('proMonthly').value = state.proMonthly;
  document.getElementById('proAnnual').value = state.proAnnual;
  document.getElementById('apiMonthly').value = state.apiMonthly;
  document.getElementById('apiAnnual').value = state.apiAnnual;
  document.getElementById('discountLabel').value = state.discountLabel;
  document.getElementById('accentColor').value = state.accentColor;
  document.getElementById('apiRequests').value = state.apiRequests;
}

function setBilling(mode) {
  billing = mode;
  document.getElementById('btnMonthly').className = `billing-btn ${mode === 'monthly' ? 'active' : ''}`;
  document.getElementById('btnAnnual').className = `billing-btn ${mode === 'annual' ? 'active' : ''}`;
  renderCards();
}

function getTiers() {
  return [
    {
      name: 'Free', nameClass: '', price: '$0', suffix: 'forever',
      description: 'Get started with the essentials', highlighted: false,
      features: ['Core dashboard panels', 'Global news feed', 'Earthquake & weather alerts', 'Basic map view'],
      cta: 'GET STARTED', ctaClass: 'secondary',
    },
    {
      name: 'Pro', nameClass: 'green', highlighted: true,
      price: billing === 'annual' ? `$${state.proAnnual}` : `$${state.proMonthly}`,
      suffix: billing === 'annual' ? 'yr' : 'mo',
      description: 'Full intelligence dashboard',
      features: ['Everything in Free', 'AI stock analysis & backtesting', 'Daily market briefs', 'Military & geopolitical tracking', 'Custom widget builder', 'MCP data connectors', 'Priority data refresh'],
      cta: 'GET STARTED', ctaClass: 'primary',
    },
    {
      name: 'API', nameClass: '', highlighted: false,
      price: billing === 'annual' ? `$${state.apiAnnual}` : `$${state.apiMonthly}`,
      suffix: billing === 'annual' ? 'yr' : 'mo',
      description: 'Programmatic access to intelligence data',
      features: ['REST API access', 'Real-time data streams', `${state.apiRequests} requests/day`, 'Webhook notifications', 'Custom data exports'],
      cta: 'GET STARTED', ctaClass: 'secondary',
    },
    {
      name: 'Enterprise', nameClass: '', price: 'Custom', suffix: 'tailored to you',
      description: 'Custom solutions for organizations', highlighted: false,
      features: ['Everything in Pro + API', 'Unlimited API requests', 'Dedicated support', 'Custom integrations', 'SLA guarantee', 'On-premise option'],
      cta: 'CONTACT SALES', ctaClass: 'secondary',
    },
  ];
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = getTiers().map(tier => `
    <div class="tier-card ${tier.highlighted ? 'highlighted' : ''}">
      ${tier.highlighted ? `<div class="badge">${zapSvg} Most Popular</div>` : ''}
      <div class="tier-name ${tier.nameClass}">${tier.name}</div>
      <div class="tier-desc">${tier.description}</div>
      <div class="tier-price">
        <span class="amount">${tier.price}</span>
        <span class="suffix">/${tier.suffix}</span>
      </div>
      <ul class="features-list">
        ${tier.features.map(f => `<li>${checkSvg(tier.highlighted ? 'green' : 'gray')}<span>${f}</span></li>`).join('')}
      </ul>
      <a class="cta-btn ${tier.ctaClass}" href="#">${tier.cta} ${arrowSvg}</a>
    </div>
  `).join('');
}

function updateAll() {
  readControls();
  document.documentElement.style.setProperty('--green', state.accentColor);
  document.getElementById('saveBadge').textContent = state.discountLabel;
  renderCards();
}

const PRESETS = {
  current: { proMonthly: 19, proAnnual: 190, apiMonthly: 49, apiAnnual: 490, discountLabel: 'Save 17%', accentColor: '#22c55e', apiRequests: '1,000' },
  higher: { proMonthly: 29, proAnnual: 290, apiMonthly: 79, apiAnnual: 790, discountLabel: 'Save 17%', accentColor: '#22c55e', apiRequests: '5,000' },
  startup: { proMonthly: 9, proAnnual: 89, apiMonthly: 29, apiAnnual: 290, discountLabel: 'Save 19%', accentColor: '#22c55e', apiRequests: '500' },
};

function applyPreset(name) {
  Object.assign(state, PRESETS[name]);
  writeControls();
  updateAll();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase().replace(' ', '') === name));
}

updateAll();
</script>
</body>
</html>
