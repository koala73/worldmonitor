        <h2>World Monitor — One dashboard. The whole world, live.</h2>
        <p>World Monitor fuses 500+ news feeds, conflict trackers, market data, shipping lanes, satellites and cyber signals into a single real-time picture — with AI that tells you what actually matters. Free, no signup required.</p>
        <p><a href="https://www.worldmonitor.app/" style="color:#4ade80;">Launch the dashboard</a> or explore the specialized variants: <a href="https://tech.worldmonitor.app/" style="color:#4ade80;">Tech Monitor</a>, <a href="https://finance.worldmonitor.app/" style="color:#4ade80;">Finance Monitor</a>, <a href="https://commodity.worldmonitor.app/" style="color:#4ade80;">Commodity Monitor</a>, <a href="https://energy.worldmonitor.app/" style="color:#4ade80;">Energy Monitor</a>, and <a href="https://happy.worldmonitor.app/" style="color:#4ade80;">Happy Monitor</a>.</p>
        <p>Data comes from <a href="https://acleddata.com/" style="color:#4ade80;" rel="noopener noreferrer">ACLED</a>, <a href="https://ucdp.uu.se/" style="color:#4ade80;" rel="noopener noreferrer">UCDP</a>, <a href="https://firms.modaps.eosdis.nasa.gov/" style="color:#4ade80;" rel="noopener noreferrer">NASA FIRMS</a>, <a href="https://finnhub.io/" style="color:#4ade80;" rel="noopener noreferrer">Finnhub</a>, <a href="https://fred.stlouisfed.org/" style="color:#4ade80;" rel="noopener noreferrer">FRED</a>, <a href="https://aisstream.io/" style="color:#4ade80;" rel="noopener noreferrer">AISStream</a>, <a href="https://opensky-network.org/" style="color:#4ade80;" rel="noopener noreferrer">OpenSky</a>, and 60+ other live providers. Full source on <a href="https://github.com/koala73/worldmonitor" style="color:#4ade80;" rel="noopener noreferrer">GitHub (AGPL-3.0)</a>.</p>
        <h3>What you can do</h3>
        <ul>
          <li><strong>See</strong> — 56 map layers across a dual 3D-globe/WebGL map: conflicts, vessels, flights, satellites, pipelines, submarine cables, AI datacenters.</li>
          <li><strong>Understand</strong> — daily AI brief, Country Instability Index across 196 countries, cross-source correlation, Scenario Engine.</li>
          <li><strong>Act</strong> — custom monitors and alerts, Route Explorer, 39-tool MCP server and API for Claude, GPT and custom agents.</li>
        </ul>
        <p>Upgrade to <a href="https://www.worldmonitor.app/pro" style="color:#4ade80;">World Monitor Pro</a> for the AI analyst, personal intelligence digest, custom widget builder, and MCP/API access — from $39.99/month.</p>
